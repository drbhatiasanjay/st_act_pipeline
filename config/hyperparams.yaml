# ST-ACT Pipeline Configuration (Best Practices)
#
# NOT LOADED ANYWHERE -- confirmed dead (no yaml.safe_load/yaml.load or any reference
# to this file from any .py in the repo). Real hyperparameters live inline in
# kaggle_kernel/train_kernel.py's HYPERPARAMS dict and run_pipeline.py's module-level
# constants (CNN_THRESHOLD, BIRTH_COST, etc.), not here. Kept only as a rough historical
# reference -- do not assume editing this file changes any real behavior, and do not
# trust its values as current (model.in_channels below is stale: real UNet3D uses
# in_channels=2, not 1, since Phase 1's 2-channel detection head).
data:
  zarr_store_path: "data/cell_tracking_volume.zarr"
  anisotropy_ratio: [4.0, 1.0, 1.0]
  dtype: "float32"

model:
  in_channels: 1  # STALE -- real UNet3D uses in_channels=2, see src/model.py
  base_features: 16
  learning_rate: 0.001
  batch_size: 2
  epochs: 50

tracker:
  birth_cost: 15.0
  death_cost: 15.0
  division_reward: -8.0
  max_search_radius: 40.0
